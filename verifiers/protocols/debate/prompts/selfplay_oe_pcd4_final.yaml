version: 2

# Open-ended GPQA proposer/critic debate with a simultaneous final slot:
# proposer opens, critic challenges, proposer rebuts, critic counter-critiques,
# then the proposer writes a final answer while the critic states whether the
# proposed state of the world is acceptable. Member ids remain
# debater_a/debater_b/judge; debater_a is the proposer and debater_b the critic.

system:
  debater_a: >-
    You are {{ viewer_id }}, the proposer in a scientific debate. Your job is
    to give the best answer you can, make the reasoning transparent, and defend
    or improve that answer after criticism. Be concrete and intellectually
    honest: a strong proposal may change when the critique exposes a real flaw,
    but it should not drift just because the critic sounds confident.
  debater_b: >-
    You are {{ viewer_id }}, the critic in a scientific debate. Your job is to
    test whether the proposal is reliable, not to solve the problem from
    scratch. Find concrete gaps, contradictions, ignored constraints, or
    unsupported leaps. If the proposal is basically sound after the rebuttal,
    say so plainly; if not, state the remaining problem clearly.
  judge: >-
    You're judging a proposer-critic scientific debate. You can't verify the
    claims yourself, so judge only what's written and don't try to solve the
    problem on your own. The structure is proposal, critique, rebuttal,
    counter-critique, then simultaneous final statements. The proposer gives a
    final answer; the critic says whether that proposed state of the world is
    acceptable. Pick debater_a when the proposal survives scrutiny. Pick
    debater_b when the critic shows the proposal remains unreliable. Call it a
    tie when the record is balanced or unresolved. Remember that neither side
    saw the other's final statement while writing their own.


    {{ schedule_explainer }}

question:
  debater_a: "{{ task_prompt }}"
  debater_b: "{{ task_prompt }}"
  judge: "{{ task_prompt }}"

user:
  debater_a:
    propose: >-
      Propose your best complete free-form answer. Explain the reasoning that
      supports it and make clear what would distinguish this answer from nearby
      alternatives. Do not use XML tags in your reasoning. Put your final answer
      in exactly one <answer>...</answer> tag at the very end, and do not write
      any other <answer> tag.
    rebuttal: >-
      You have seen the critic's challenge. Respond to the strongest concrete
      point they raised. Defend your proposal where it still stands, concede
      any real flaw, and revise the answer only if the criticism warrants it.
      Do not use XML tags in your reasoning. End with exactly one
      <rebuttal>...</rebuttal> tag and exactly one <answer>...</answer> tag.
    final: >-
      You have seen the full exchange so far, but not your opponent's final
      answer. Give your final answer and the concise reason it should prevail.
      Do not add new unrelated material; focus on what the exchange established.
      Do not use XML tags in your reasoning. End with exactly one
      <final_reasoning>...</final_reasoning> tag and exactly one
      <answer>...</answer> tag.
  debater_b:
    critique: >-
      Critique the proposed answer. Focus on the strongest concrete issue:
      an incorrect claim, missing step, ignored constraint, ambiguity, or weak
      evidence. If the proposal seems sound, say what would still need checking
      rather than inventing a flaw. Do not use XML tags in your reasoning. End
      with exactly one <critique>...</critique> tag and exactly one
      <verdict>...</verdict> tag. The verdict value should be one of:
      sound, uncertain, flawed.
    counter_critique: >-
      You have seen the proposer's rebuttal. Give a focused counter-critique:
      acknowledge any repair that works, then identify the strongest remaining
      weakness or uncertainty. Do not introduce an unrelated attack unless it
      follows directly from the exchange. Do not use XML tags in your reasoning.
      End with exactly one <counter_critique>...</counter_critique> tag and
      exactly one <verdict>...</verdict> tag. The verdict value should be one
      of: sound, uncertain, flawed.
    final: >-
      You have seen the full exchange so far, but not your opponent's final
      answer. State whether the proposed state of the world is acceptable after
      the rebuttal. If you accept it, say so and do not manufacture a remaining
      objection. If you do not accept it, name the strongest unresolved flaw.
      Do not use XML tags in your reasoning. End with exactly one
      <remaining_critique>...</remaining_critique> tag, exactly one
      <status>...</status> tag, and exactly one <answer>...</answer> tag
      containing the answer you would stand behind. If you accept the proposal,
      restate its final answer; if unresolved, give the best available answer
      or "unknown". The status value should be exactly one of: accept,
      unresolved, reject.
  judge:
    final: >-
      Decide the winner now. Base the decision only on the arguments in the
      transcript, not on outside knowledge or the hidden reference answer. Pick
      debater_a if the proposal, rebuttal, and final answer survive scrutiny;
      pick debater_b if the critic's remaining objection shows the proposal is
      unreliable; pick tie if the record is balanced or unresolved. Do not use
      XML tags in your reasoning. End with exactly one
      <reasoning>...</reasoning> tag and exactly one
      <decision>...</decision> tag. The decision value must be exactly one of:
      debater_a, debater_b, tie. Do not write anything after the final
      </decision> tag.

opponent_wrap:
  debater: |-
    --- Other participant {{ member_id }} ({{ phase }}) ---
    {{ text }}
    {%- if reasoning %}
    --- {{ member_id }}'s reasoning ---
    {{ reasoning }}
    {%- endif %}
    --- End of {{ member_id }}'s {{ phase }} ---
  judge: |-
    --- {{ member_id }} ({{ phase }}) ---
    {{ text }}
    {%- if reasoning %}
    --- {{ member_id }}'s reasoning ---
    {{ reasoning }}
    {%- endif %}
    --- End of {{ member_id }}'s {{ phase }} ---

fields:
  debater_a:
    propose:
      answer:
        type: str
        description: "the proposed answer to the question — a complete, self-contained free-form response"
    rebuttal:
      rebuttal:
        type: str
        description: "the response to the critic's strongest point"
      answer:
        type: str
        description: "the revised or defended answer to the question"
    final:
      final_reasoning:
        type: str
        description: "the final reason this answer should prevail"
      answer:
        type: str
        description: "the final answer to the question — a complete, self-contained free-form response"
  debater_b:
    critique:
      critique:
        type: str
        description: "the strongest concrete issue with the proposed answer, or why no serious issue was found"
      verdict:
        type: str
        description: "sound, uncertain, or flawed"
        scoring: {mode: enum, values: [sound, uncertain, flawed]}
    counter_critique:
      counter_critique:
        type: str
        description: "the strongest remaining issue after the rebuttal, or why the rebuttal worked"
      verdict:
        type: str
        description: "sound, uncertain, or flawed"
        scoring: {mode: enum, values: [sound, uncertain, flawed]}
    final:
      remaining_critique:
        type: str
        description: "the strongest remaining problem with the proposal, or 'none' if the proposal is acceptable"
      status:
        type: str
        description: "accept, unresolved, or reject"
        scoring: {mode: enum, values: [accept, unresolved, reject]}
      answer:
        type: str
        description: "the final answer the critic would stand behind — restate the proposal if accepted"
  judge:
    final:
      reasoning: {type: str}
      decision: {type: str, description: "debater_a, debater_b, or tie", scoring: {mode: enum, values: [debater_a, debater_b, tie]}}

_judge_prompts: gpqa_oe
