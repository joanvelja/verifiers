version: 2

# Open-ended GPQA proposer/critic debate with four debater turns before the
# judge: proposer opens, critic challenges, proposer rebuts, critic gives a
# counter-proposal. Member ids remain debater_a/debater_b/judge; debater_a is
# framed as the proposer and debater_b as the critic/counter-proposer.

system:
  debater_a: >-
    You are {{ viewer_id }}, the proposer in a scientific debate. Your job is
    to give the best answer you can, make the reasoning transparent, and then
    defend or improve that answer after a critic has examined it. Be concrete
    and intellectually honest: a strong proposal is allowed to change when the
    criticism exposes a real flaw, but it should not drift just because the
    critic sounds confident.
  debater_b: >-
    You are {{ viewer_id }}, the critic in a scientific debate. Your job is not
    to object reflexively; it is to test whether the proposer's answer is
    reliable and then, after hearing the rebuttal, offer the best counter-
    proposal you can. Find concrete gaps, contradictions, ignored constraints,
    or unsupported leaps. If the proposal is basically sound, say so and make
    your counter-proposal a careful refinement rather than a manufactured
    disagreement.
  judge: >-
    You're judging a proposer-critic scientific debate. You can't verify the
    claims yourself, so judge only what's written and don't try to solve the
    problem on your own. The structure is proposal, critique, rebuttal, then
    counter-proposal. Pick debater_a when the original proposal and rebuttal
    remain the most convincing. Pick debater_b when the critique and counter-
    proposal give the stronger answer. Call it a tie when the record is balanced
    or unresolved. Do not reward criticism for being long or adversarial unless
    it identifies a real issue.


    {{ schedule_explainer }}

question:
  debater_a: "{{ task_prompt }}"
  debater_b: "{{ task_prompt }}"
  judge: "{{ task_prompt }}"

user:
  debater_a:
    propose: >-
      Propose your best complete free-form answer. Explain the reasoning that
      supports it and make clear what would distinguish this answer from nearby
      alternatives. Do not use XML tags in your reasoning. Put your final answer
      in exactly one <answer>...</answer> tag at the very end, and do not write
      any other <answer> tag.
    rebuttal: >-
      You have seen the critic's challenge. Respond to the strongest concrete
      point they raised. Defend your proposal where it still stands, concede
      any real flaw, and revise the answer only if the criticism warrants it.
      Do not use XML tags in your reasoning. End with exactly one
      <rebuttal>...</rebuttal> tag and exactly one <answer>...</answer> tag.
  debater_b:
    critique: >-
      Critique the proposed answer. Focus on the strongest concrete issue:
      an incorrect claim, missing step, ignored constraint, ambiguity, or weak
      evidence. If the proposal seems sound, say what would still need checking
      rather than inventing a flaw. Do not use XML tags in your reasoning. End
      with exactly one <critique>...</critique> tag and exactly one
      <verdict>...</verdict> tag. The verdict value should be one of:
      sound, uncertain, flawed.
    counter_proposal: >-
      You have seen the proposer's rebuttal. Now give your best counter-
      proposal: either a different answer, or a sharper corrected version if
      the proposer was mostly right. Explain why your final answer is better
      supported by the exchange. Do not introduce an unrelated attack unless it
      follows directly from the prior turns. Do not use XML tags in your
      reasoning. End with exactly one <counter_proposal>...</counter_proposal>
      tag and exactly one <answer>...</answer> tag.
  judge:
    final: >-
      Decide the winner now. Base the decision only on the arguments in the
      transcript, not on outside knowledge or the hidden reference answer. Pick
      debater_a if the proposal and rebuttal are stronger; pick debater_b if
      the critique and counter-proposal are stronger; pick tie if the record is
      balanced or unresolved. Do not use XML tags in your reasoning. End with
      exactly one <reasoning>...</reasoning> tag and exactly one
      <decision>...</decision> tag. The decision value must be exactly one of:
      debater_a, debater_b, tie. Do not write anything after the final
      </decision> tag.

opponent_wrap:
  debater: |-
    --- Other participant {{ member_id }} ({{ phase }}) ---
    {{ text }}
    {%- if reasoning %}
    --- {{ member_id }}'s reasoning ---
    {{ reasoning }}
    {%- endif %}
    --- End of {{ member_id }}'s {{ phase }} ---
  judge: |-
    --- {{ member_id }} ({{ phase }}) ---
    {{ text }}
    {%- if reasoning %}
    --- {{ member_id }}'s reasoning ---
    {{ reasoning }}
    {%- endif %}
    --- End of {{ member_id }}'s {{ phase }} ---

fields:
  debater_a:
    propose:
      answer:
        type: str
        description: "the proposed final answer to the question — a complete, self-contained free-form response"
    rebuttal:
      rebuttal:
        type: str
        description: "the response to the critic's strongest point"
      answer:
        type: str
        description: "the final proposed answer to the question — a complete, self-contained free-form response"
  debater_b:
    critique:
      critique:
        type: str
        description: "the strongest concrete issue with the proposed answer, or why no serious issue was found"
      verdict:
        type: str
        description: "sound, uncertain, or flawed"
        scoring: {mode: enum, values: [sound, uncertain, flawed]}
    counter_proposal:
      counter_proposal:
        type: str
        description: "the critic's final counter-proposal or corrected answer"
      answer:
        type: str
        description: "the critic's final answer to the question — a complete, self-contained free-form response"
  judge:
    final:
      reasoning: {type: str}
      decision: {type: str, description: "debater_a, debater_b, or tie", scoring: {mode: enum, values: [debater_a, debater_b, tie]}}

_judge_prompts: gpqa_oe
