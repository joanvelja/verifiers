rules:
  - id: verifiers-no-future-annotations
    languages: [python]
    severity: ERROR
    message: Do not use `from __future__ import annotations`; quote only the specific forward references that need it.
    pattern: from __future__ import annotations

  - id: verifiers-no-skip-validation
    languages: [python]
    severity: ERROR
    message: SkipValidation hides type errors; use precise types and validators, or add a narrow nosemgrep waiver with a protocol-boundary rationale.
    pattern-either:
      - pattern: SkipValidation[$TYPE]
      - pattern: $P.SkipValidation[$TYPE]
      - pattern: from pydantic import SkipValidation

  - id: verifiers-v1-config-param-one-type
    languages: [python]
    severity: ERROR
    message: v1 environment `config` parameters should be one concrete config type; keep raw mappings at explicit config-loader boundaries.
    paths:
      include:
        - /environments/**/*.py
    pattern-either:
      - patterns:
          - pattern: |
              def $FUNC(..., config: $ANNOT, ...):
                  ...
          - pattern-not: |
              def $FUNC(..., config: $ANNOT = $DEFAULT, ...):
                  ...
          - metavariable-regex:
              metavariable: $ANNOT
              regex: "(Any|Mapping\\[str, object\\]|dict\\[str, object\\]|.*\\|.*)"
      - patterns:
          - pattern: |
              def $FUNC(..., config: $ANNOT = $DEFAULT, ...):
                  ...
          - metavariable-regex:
              metavariable: $ANNOT
              regex: "(Any|Mapping\\[str, object\\]|dict\\[str, object\\]|.*\\|.*\\|.*)"

  - id: verifiers-v1-load-environment-config-required
    languages: [python]
    severity: ERROR
    message: v1 load_environment must take a strict config object; do not accept None or synthesize config with config-or-Config fallback.
    paths:
      include:
        - /environments/**/*.py
    pattern-either:
      - pattern: |
          def load_environment(..., config: $CONFIG = None, ...):
              ...
      - pattern: |
          def load_environment(..., config: $CONFIG | None, ...):
              ...
      - pattern: |
          def load_environment(..., config: $CONFIG | None = $DEFAULT, ...):
              ...
      - pattern: |
          def load_environment(..., config: Optional[$CONFIG], ...):
              ...
      - pattern: |
          def load_environment(..., config: Optional[$CONFIG] = $DEFAULT, ...):
              ...

  - id: verifiers-v1-no-load-environment-config-fallback
    languages: [python]
    severity: ERROR
    message: v1 load_environment receives a concrete config object from the framework; do not use config or Config() fallback.
    paths:
      include:
        - /environments/**/*.py
    patterns:
      - pattern-inside: |
          def load_environment(...):
              ...
      - pattern: $CONFIG = $CONFIG or $DEFAULT()
      - metavariable-regex:
          metavariable: $DEFAULT
          regex: ".*Config"

  - id: verifiers-v1-load-environment-canonical-shim
    languages: [python]
    severity: ERROR
    message: v1 load_environment is only the Taskset/Harness loader shim. Keep load_environment as-is; implement the config surface through TasksetConfig, HarnessConfig, load_taskset, and load_harness instead of patching root-loader behavior.
    paths:
      include:
        - /environments/**/*.py
        - /verifiers/scripts/init.py
      exclude:
        - /environments/alphabet_sort/alphabet_sort_v1.py
        - /environments/bfcl_v3/bfcl_v3.py
        - /environments/dspy_flights/dspy_flights.py
        - /environments/dspy_rlm/dspy_rlm.py
        - /environments/hello_group_reward_v1/hello_group_reward_v1.py
        - /environments/hello_parallel_sandbox_v1/hello_parallel_sandbox_v1.py
        - /environments/hello_self_judge_v1/hello_self_judge_v1.py
        - /environments/hello_subagent_v1/hello_subagent_v1.py
        - /environments/langchain_deep_agents_wikispeedia/langchain_deep_agents_wikispeedia.py
        - /environments/math_python/math_python_v1.py
        - /environments/mcp_search_env/mcp_search_env.py
        - /environments/nemo_gym_env/nemo_gym_env/env.py
        - /environments/nested_harness_v1/nested_harness_v1.py
        - /environments/openai_agents_env/openai_agents_env.py
        - /environments/rlm_swe_v1/rlm_swe_v1.py
        - /environments/tau2_bench_v1/tau2_bench_v1.py
        - /environments/wiki_search/wiki_search_v1.py
    patterns:
      - pattern: |
          def load_environment(config: $CONFIG) -> vf.Env:
              ...
      - pattern-not: |
          def load_environment(config: vf.EnvConfig) -> vf.Env:
              return vf.Env(
                  taskset=vf.load_taskset(config=config.taskset),
                  harness=vf.load_harness(config=config.harness),
              )
      - pattern-not: |
          def load_environment(config: vf.EnvConfig) -> vf.Env:
              """Loader pattern for all Taskset/Harness environments."""
              return vf.Env(
                  taskset=vf.load_taskset(config=config.taskset),
                  harness=vf.load_harness(config=config.harness),
              )

  - id: verifiers-v1-no-config-object-defaults
    languages: [python]
    severity: ERROR
    message: Public v1 `config` parameters must be strict config objects; do not construct config objects in function signatures.
    paths:
      include:
        - /verifiers/v1/**/*.py
        - /environments/**/*.py
    patterns:
      - pattern: |
          def $FUNC(..., config: $CONFIG = $DEFAULT(), ...):
              ...
      - metavariable-regex:
          metavariable: $DEFAULT
          regex: ".*Config"

  - id: verifiers-no-private-framework-classes
    languages: [python]
    severity: ERROR
    message: Do not define leading-underscore classes in framework code; use a clear public name or a module-level value/function instead.
    paths:
      include:
        - /verifiers/**/*.py
    pattern-regex: "^\\s*class _[A-Za-z]"

  - id: verifiers-no-raw-any-v1
    languages: [python]
    severity: ERROR
    message: Do not use raw `Any` in v1 or environment code; use a precise type or a named boundary alias in verifiers.v1.types.
    paths:
      include:
        - /verifiers/v1/**/*.py
        - /environments/**/*.py
      exclude:
        - /verifiers/v1/types.py
        - /environments/openenv_*/proj/**/*.py
    pattern-regex: "\\bAny\\b"

  - id: verifiers-no-raw-object-containers-v1
    languages: [python]
    severity: ERROR
    message: Do not spell broad object containers in v1 or environment code; use concrete config models, ConfigData, Handler, BindingsConfig, Objects, or a narrower type. Do not patch around weak typing with generic containers.
    paths:
      include:
        - /verifiers/v1/**/*.py
        - /environments/**/*.py
      exclude:
        - /verifiers/v1/types.py
        - /verifiers/v1/utils/object_utils.py
        - /verifiers/v1/utils/task_freeze_utils.py
        - /environments/openenv_*/proj/**/*.py
    pattern-regex: "(?x)(\\b(?:Mapping|MutableMapping|dict|list|Sequence|Iterable|Callable|Awaitable|tuple)\\[[^\\n\\]]*\\bobject\\b|\\bcast\\([^\\n)]*\\bobject\\b)"

  - id: verifiers-no-raw-mapping-annotations-v1
    languages: [python]
    severity: ERROR
    message: Do not use raw Mapping annotations in v1 or environment code; normalize at the boundary to a dict, a typed Config model, or a named v1 boundary type. Do not patch around unclear contracts with loose Mapping types.
    paths:
      include:
        - /verifiers/v1/**/*.py
        - /environments/**/*.py
      exclude:
        - /verifiers/v1/types.py
        - /environments/openenv_*/proj/**/*.py
    pattern-regex: "\\b(?:Mapping|MutableMapping)\\["

  - id: verifiers-v1-package-no-mapping
    languages: [python]
    severity: ERROR
    message: Package taskset/harness implementations should not use Mapping as a loose shape escape hatch; use concrete dict payloads, typed Config models, or package utils that encode a real protocol boundary.
    paths:
      include:
        - /packages/tasksets/tasksets/**/*.py
        - /packages/harnesses/harnesses/**/*.py
        - /verifiers/v1/**/*.py
      exclude:
        - /verifiers/v1/types.py
    pattern-regex: "\\b(?:Mapping|MutableMapping)\\b"

  - id: verifiers-get-messages-typed
    languages: [python]
    severity: ERROR
    message: "`get_messages` must return typed `Message` objects, not raw dictionaries."
    paths:
      include:
        - /verifiers/utils/message_utils.py
    pattern-regex: "def\\s+get_messages\\b[\\s\\S]*?->\\s*list\\s*\\[\\s*dict\\b"

  - id: verifiers-v1-no-signal-factories
    languages: [python]
    severity: ERROR
    message: v1 reward/update/metric handlers must be direct decorated methods or functions, not factories; put runtime resources on state/config/bindings instead of patching around weak ownership.
    paths:
      include:
        - /environments/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
    pattern-either:
      - pattern: |
          def $OUTER(...):
              ...
              @vf.reward(...)
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.reward
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.update(...)
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.update
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.metric(...)
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.metric
              async def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.reward(...)
              def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.reward
              def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.update(...)
              def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.update
              def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.metric(...)
              def $INNER(...):
                  ...
              ...
              return $INNER
      - pattern: |
          def $OUTER(...):
              ...
              @vf.metric
              def $INNER(...):
                  ...
              ...
              return $INNER

  - id: verifiers-v1-no-v0-parser-in-v1-modules
    languages: [python]
    severity: ERROR
    message: Modules that import verifiers.v1 must not use v0 Parser/XMLParser objects; parse inline with normal Python.
    paths:
      include:
        - /environments/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
    patterns:
      - pattern-either:
          - pattern-inside: |
              import verifiers.v1 as vf
              ...
          - pattern-inside: |
              from verifiers import v1 as vf
              ...
          - pattern-inside: |
              from verifiers.v1 import $IMPORT
              ...
      - pattern-either:
          - pattern: vf.Parser(...)
          - pattern: vf.XMLParser(...)
          - pattern: Parser(...)
          - pattern: XMLParser(...)

  - id: verifiers-v1-no-env-var-reads-in-signals
    languages: [python]
    severity: ERROR
    message: v1 reward/update handlers must not read env vars directly; use state.get_client(api="chat") and optionally read state.get_endpoint_config(api="chat").model for model selection.
    paths:
      include:
        - /environments/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
    pattern-either:
      - pattern: |
          @vf.reward(...)
          async def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.reward
          async def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.update(...)
          async def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.update
          async def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.reward(...)
          def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.reward
          def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.update(...)
          def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.update
          def $FUNC(...):
              ...
              os.getenv(...)
              ...
      - pattern: |
          @vf.reward(...)
          async def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.reward
          async def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.update(...)
          async def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.update
          async def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.reward(...)
          def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.reward
          def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.update(...)
          def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.update
          def $FUNC(...):
              ...
              os.environ.get(...)
              ...
      - pattern: |
          @vf.reward(...)
          async def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.reward
          async def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.update(...)
          async def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.update
          async def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.reward(...)
          def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.reward
          def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.update(...)
          def $FUNC(...):
              ...
              os.environ[$KEY]
              ...
      - pattern: |
          @vf.update
          def $FUNC(...):
              ...
              os.environ[$KEY]
              ...

  - id: verifiers-v1-no-judge-endpoint-config-fields
    languages: [python]
    severity: ERROR
    message: Judge rewards must use state.get_endpoint_config(api="chat"); expose only judge_model, not judge_base_url or judge_api_key_var config fields.
    paths:
      include:
        - /environments/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
    patterns:
      - pattern-inside: |
          class $CONFIG(vf.TasksetConfig):
              ...
      - pattern-either:
          - pattern: "judge_base_url: $TYPE = $VALUE"
          - pattern: "judge_api_key_var: $TYPE = $VALUE"

  - id: verifiers-v1-no-raw-kwargs-in-subclass-init
    languages: [python]
    severity: ERROR
    message: v1 Taskset/Harness subclass __init__ methods must not accept raw **kwargs; spell forwarded kwargs explicitly.
    paths:
      include:
        - /environments/**/*.py
        - /verifiers/v1/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
        - /verifiers/v1/utils/**/*.py
    patterns:
      - pattern-inside: |
          class $CLS(...):
              ...
      - metavariable-regex:
          metavariable: $CLS
          regex: ".*(Taskset|Harness)$"
      - pattern: |
          def __init__(..., **$KWARGS):
              ...

  - id: verifiers-v1-no-taskset-harness-init-overrides
    languages: [python]
    severity: ERROR
    message: v1 Taskset/Harness subclasses must not override __init__; put construction data on typed Config classes and lifecycle/runtime behavior on standard methods instead of patching constructors.
    paths:
      include:
        - /environments/**/*.py
        - /packages/tasksets/tasksets/**/*.py
        - /packages/harnesses/harnesses/**/*.py
        - /verifiers/v1/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
        - /packages/tasksets/tasksets/utils/**/*.py
        - /packages/harnesses/harnesses/utils/**/*.py
        - /verifiers/v1/taskset.py
        - /verifiers/v1/harness.py
        - /verifiers/v1/utils/**/*.py
    patterns:
      - pattern-inside: |
          class $CLS(...):
              ...
      - metavariable-regex:
          metavariable: $CLS
          regex: ".*(Taskset|Harness)$"
      - pattern: |
          def __init__(...):
              ...

  - id: verifiers-v1-package-no-static-classmethod-helpers
    languages: [python]
    severity: ERROR
    message: Package taskset/harness implementations should use direct instance methods and standard lifecycle hooks; do not patch around weak ownership with staticmethod/classmethod helpers.
    paths:
      include:
        - /packages/tasksets/tasksets/*.py
        - /packages/harnesses/harnesses/*.py
    pattern-either:
      - pattern: "@staticmethod"
      - pattern: "@classmethod"

  - id: verifiers-v1-no-transcript-user-callback-param
    languages: [python]
    severity: ERROR
    message: Do not use transcript as a user callback parameter name in v1 environments; use messages for the rendered prompt/completion messages.
    paths:
      include:
        - /environments/**/*.py
      exclude:
        - /environments/**/proj/**/*.py
        - /environments/**/tasks/**/*.py
    pattern-regex: "def\\s+[A-Za-z_][A-Za-z0-9_]*\\s*\\([^)]*\\btranscript\\b"
