[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tasksets"
dynamic = ["version"]  # load from tasksets/__init__.py
authors = [
    {name = "William Brown", email = "williambrown97@gmail.com"},
]
description = "Reusable tasksets for Verifiers"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10,<3.14"
dependencies = [
    "verifiers>=0.1.15.dev11",
]

[project.optional-dependencies]
openenv = [
    "openenv-core>=0.3.0",
]
openreward = [
    "openreward>=0.1.123; python_version >= '3.11'",
]
ta = [
    "nltk",
    "textarena",
]
nemogym = [
    "nemo-gym>=0.2.1,<0.3; python_version >= '3.12'",
]

[project.urls]
Homepage = "https://github.com/primeintellect-ai/verifiers"
Repository = "https://github.com/primeintellect-ai/verifiers.git"
Issues = "https://github.com/primeintellect-ai/verifiers/issues"

[tool.uv]
preview = true
exclude-newer = "7 days"

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true

[tool.uv.exclude-newer-package]
# PrimeIntellect-published on PyPI (trusted publisher)
verifiers = false

[tool.hatch.version]
path = "tasksets/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["tasksets"]
