name: Test

on:
  pull_request:
    branches: [main, master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "packages/**"
      - ".github/workflows/test.yml"
  push:
    branches: [main, master]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "packages/**"
      - ".github/workflows/test.yml"

env:
  HF_HOME: ${{ github.workspace }}/.cache/huggingface

jobs:
  test:
    name: Verifiers
    runs-on: ubuntu-latest
    env:
      PRIME_API_KEY: ${{ secrets.PRIME_API_KEY }}
      PRIME_TEAM_ID: ${{ secrets.PRIME_TEAM_ID }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Hugging Face tokenizers
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-tokenizers-${{ runner.os }}-${{ hashFiles('uv.lock', 'tests/test_renderer_client.py', 'tests/test_renderer_e2e.py') }}
          restore-keys: |
            hf-tokenizers-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync

      - name: Install prime
        run: uv pip install prime

      - name: Run tests
        run: |
          uv run pytest tests/ -v --ignore=tests/test_envs.py -m "not prime_sandbox" --cov=verifiers --cov-report=xml --cov-report=term

      - name: Run Prime sandbox tests
        env:
          PRIME_API_KEY: ${{ secrets.PRIME_API_KEY }}
          PRIME_TEAM_ID: ${{ secrets.PRIME_TEAM_ID }}
        run: |
          if [ -z "$PRIME_API_KEY" ] || [ -z "$PRIME_TEAM_ID" ]; then
            echo "Skipping Prime sandbox tests because PRIME_API_KEY and/or PRIME_TEAM_ID are not configured."
            exit 0
          fi
          uv run pytest tests/test_v1_runtime_lifecycle.py -v -m prime_sandbox --cov=verifiers --cov-append --cov-report=xml --cov-report=term
  test-envs:
    name: Environments
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PRIME_API_KEY: ${{ secrets.PRIME_API_KEY }}
      PRIME_TEAM_ID: ${{ secrets.PRIME_TEAM_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed environments
        id: changed-envs
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          path: environments
          dir_names: true
          dir_names_max_depth: 1
          separator: ","
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync

      - name: Install prime
        run: uv pip install prime

      - name: Run environment tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export CHANGED_ENVS="${{ steps.changed-envs.outputs.all_changed_files || 'none' }}"
            echo "CHANGED_ENVS: $CHANGED_ENVS"
          fi
          uv run pytest tests/test_envs.py -vv
